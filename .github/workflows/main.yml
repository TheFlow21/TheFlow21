      name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: 'Agent Name'
        required: true
        default: 'TheFlow21'
      agent_description:
        description: 'Agent Description'
        required: true
        default: 'AI Agent'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install ClawHub
        run: npx --yes clawhub@latest install verified-agent-identity

      - name: Run Verification
        run: npx --yes clawhub@latest run verified-agent-identity \
          --name "${{ github.event.inputs.agent_name }}" \
          --description "${{ github.event.inputs.agent_description }}"
